version: 2
updates:
  # npm / pnpm dependencies (root library + example workspaces)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk updates into single PRs to cut review noise.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # Peer dep pinned to an exact version on purpose; bump deliberately.
      - dependency-name: "@xyflow/svelte"
    labels:
      - dependencies

  # Keep the GitHub Actions used in workflows up to date
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
