name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.11.0'
  # Ephemeral token for reading @thepia/* from GitHub Packages; inherited by
  # every step, including the nested demo installs.
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: https://npm.pkg.github.com
          scope: '@thepia'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ephemeral, auto-expires

      - name: Lint with Biome
        run: pnpm run check

      - name: Type check
        run: pnpm run typecheck

      - name: Build library
        run: pnpm run build

      - name: Run unit tests
        run: pnpm run test:unit

      - name: Run package/bundle validation tests
        # These read from dist/ (types, tree-shaking, i18n, paraglide output),
        # so they must run AFTER the build step above. They are excluded from the
        # coverage run because that job does not build.
        run: pnpm run test:package

      # - name: Run integration tests (CI-safe)
      #   run: pnpm run test:integration:env
      #   env:
      #     TEST_API_ENV: public

      - name: Generate test coverage
        # CI-scoped: excludes integration/critical tests that require a live API
        # (dev.thepia.com:8443) and the paraglide build-artifact check, none of
        # which are available on a runner. Full `test:coverage` runs locally.
        run: pnpm run test:coverage:ci

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: https://npm.pkg.github.com
          scope: '@thepia'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm run build

      # flows-app-demo and tasks-app-demo are workspace members, so the root
      # install above already installed their deps. Build them through the
      # workspace filter (no per-example install / frozen-lockfile needed).
      - name: Build example demos
        run: pnpm --filter flows-app-demo --filter tasks-app-demo build
