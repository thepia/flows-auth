name: 🔒 Protect Authentication Patterns

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/core/stores/**'
      - 'src/core/utils/sessionManager.ts'
      - 'src/core/api/auth-api.ts'
      - 'src/core/types/index.ts'
      - 'tests/**'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.11.0'
jobs:
  critical-auth-tests:
    name: 🚨 Critical Authentication Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
        registry-url: https://npm.pkg.github.com
        scope: '@thepia'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ephemeral, auto-expires

    - name: 🔒 CRITICAL - API Contract Tests
      run: |
        echo "Running CRITICAL API contract tests..."
        pnpm run test:critical --reporter=verbose
      env:
        CI: true

    - name: 🔒 CRITICAL - Session Management Tests
      run: |
        echo "Running CRITICAL session management tests..."
        pnpm vitest run tests/utils/storageManager.test.ts --reporter=verbose
      env:
        CI: true

    - name: 🔒 CRITICAL - Auth Store Tests
      run: |
        echo "Running CRITICAL auth store tests..."
        pnpm vitest run tests/stores/auth-store.test.ts --reporter=verbose
      env:
        CI: true

    - name: Generate test coverage report
      run: |
        pnpm run test:coverage:ci
        echo "## 🔒 Authentication Test Coverage" >> $GITHUB_STEP_SUMMARY
        echo "Critical authentication patterns are protected by comprehensive tests." >> $GITHUB_STEP_SUMMARY

  api-compatibility-check:
    name: 🔄 API Compatibility Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
        registry-url: https://npm.pkg.github.com
        scope: '@thepia'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ephemeral, auto-expires

    - name: Check API response format compatibility
      run: |
        echo "Checking API response format compatibility..."
        
        # Check if signInWithPasskey handles both response formats
        if ! grep -q "response.step === 'success'" src/core/stores/auth-store.ts; then
          echo "❌ CRITICAL: Legacy response format support missing!"
          echo "   signInWithPasskey must handle {step: 'success', ...} format"
          exit 1
        fi

        if ! grep -q "response.*success" src/core/stores/auth-store.ts; then
          echo "❌ CRITICAL: New response format support missing!"
          echo "   signInWithPasskey must handle {success: true, ...} format"
          exit 1
        fi
        
        echo "✅ API response format compatibility verified"

    - name: Check session storage key consistency
      run: |
        echo "Checking session storage key consistency..."

        # Verify sessionManager uses the main storage key
        STORAGE_KEY="thepia_auth_session"

        if ! grep -q "$STORAGE_KEY" src/core/utils/sessionManager.ts; then
          echo "❌ CRITICAL: sessionManager not using consistent storage key!"
          exit 1
        fi

        # Verify the legacy 'auth_access_token' key is still handled for backward
        # compatibility. It moved out of the (now-removed) auth-state-machine into the
        # API client (src/core/api/auth-api.ts, src/core/api/sync-api.ts), so search across src/.
        if ! grep -rq "auth_access_token" src/; then
          echo "❌ CRITICAL: legacy 'auth_access_token' storage key no longer handled!"
          exit 1
        fi

        echo "✅ Session storage key consistency verified"

  build-and-integration:
    name: 🏗️ Build & Integration
    runs-on: ubuntu-latest
    needs: [critical-auth-tests, api-compatibility-check]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
        registry-url: https://npm.pkg.github.com
        scope: '@thepia'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ephemeral, auto-expires

    - name: Build flows-auth
      run: pnpm build

    - name: Verify exports
      run: |
        echo "Verifying critical exports are available..."
        node -e "
          const flowsAuth = require('./dist/index.cjs');
          const requiredExports = [
            'createAuthStore',
            'configureSessionStorage', 
            'getOptimalSessionConfig',
            'isAuthenticatedFromSession',
            'getCurrentUserFromSession'
          ];
          
          for (const exportName of requiredExports) {
            if (!flowsAuth[exportName]) {
              console.error(\`❌ CRITICAL: Missing export \${exportName}\`);
              process.exit(1);
            }
          }
          
          console.log('✅ All critical exports verified');
        "

    - name: Integration test with flows.thepia.net
      run: |
        echo "Testing integration with flows.thepia.net..."
        
        # Simulate the integration by checking package.json compatibility
        if [ -f "../flows.thepia.net/package.json" ]; then
          echo "✅ flows.thepia.net integration ready"
        else
          echo "⚠️ flows.thepia.net not found for integration test"
        fi

  security-audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ env.PNPM_VERSION }}
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
        registry-url: https://npm.pkg.github.com
        scope: '@thepia'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ephemeral, auto-expires

    - name: Run security audit
      run: pnpm audit || true  # Don't fail on audit issues for now

    - name: Check for sensitive data exposure
      run: |
        echo "Checking for sensitive data exposure..."
        
        # Check that credentials are not logged
        if grep -r "console.log.*credential" src/ --exclude-dir=tests; then
          echo "❌ SECURITY: Credential data may be logged!"
          exit 1
        fi
        
        # Check that tokens are not logged in full
        if grep -r "console.log.*access_token.*:" src/ --exclude-dir=tests; then
          echo "❌ SECURITY: Access tokens may be logged!"
          exit 1
        fi
        
        echo "✅ Security audit passed"
