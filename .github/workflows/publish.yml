name: Publish to GitHub Packages

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.11.0'

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub releases + upload the tarball asset
      packages: write   # publish to GitHub Packages
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@thepia'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ephemeral, auto-expires

      - name: Lint with Biome
        run: pnpm run check

      - name: Type check
        run: pnpm run typecheck

      # Build BEFORE tests: the package/bundle suites read from dist/, and many
      # unit tests import the built entry (dist/index.js). Running tests first
      # fails with dist/* ENOENT.
      - name: Build library
        run: pnpm run build

      # CI-safe scope only. `pnpm run test` runs the whole suite, including
      # tests/integration/** which require the live API (dev.thepia.com:8443)
      # that isn't reachable on a publish runner. Mirror the proven-green ci.yml
      # gate: unit tests + post-build package/bundle validation.
      - name: Run tests
        run: |
          pnpm run test:unit
          pnpm run test:package

      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts

      - name: Configure pnpm authentication
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "${NODE_AUTH_TOKEN}"
          pnpm config set @thepia:registry https://npm.pkg.github.com
        env:
          # Built-in, auto-provided token — no PAT to create or rotate. Authorized
          # to publish because package.json `repository` points at this repo and the
          # job grants `packages: write`.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create release tarball
        run: npm pack
        
      - name: Create GitHub Release with tarball
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            *.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          # Built-in, auto-provided token — no PAT to create or rotate. Authorized
          # to publish because package.json `repository` points at this repo and the
          # job grants `packages: write`.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
